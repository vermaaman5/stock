name: Update stock prices

on:
  schedule:
    # 3:30 PM IST = 10:00 UTC (IST is UTC+5:30)
    - cron: "0 10 * * 1-5"   # Monday–Friday only

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit prices.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price update
        run: python update_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date +'%Y-%m-%d %H:%M IST' -d '+5 hours 30 minutes')"
          git push
