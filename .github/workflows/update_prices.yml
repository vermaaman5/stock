name: Update stock prices

on:
  schedule:
    # 9:00 AM IST = 3:30 UTC
    - cron: "30 3 * * 1-5"   # Monday–Friday only
    # Backup run at 4:00 PM IST = 10:30 UTC (after market close)
    - cron: "30 10 * * 1-5"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -U yfinance

      - name: Run price update
        run: python update_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date +'%Y-%m-%d %H:%M IST' -d '+5 hours 30 minutes')"
          git push
